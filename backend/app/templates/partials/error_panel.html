{# Swapped into #mainbodycontent when an HTMX navigation hits an error. #}
{# Server flags these responses with X-Error-Page; custom.js opts them in #}
{# to swapping (htmx ignores 4xx/5xx bodies by default). #}
<div style="width: min(90%, 32rem); margin: 2rem auto;">
  <calcite-notice open kind="{{ kind|default:'danger' }}" icon="{{ icon|default:'exclamation-mark-triangle' }}"
                  width="full">
    <div slot="title">{{ code }} &mdash; {{ title }}</div>
    <div slot="message">{{ message }}</div>
  </calcite-notice>
  <div style="display: flex; justify-content: center; margin-top: 1rem;">
    <calcite-button icon-start="home" hx-get="{% url 'enterpriseviz:index' %}" hx-target="#mainbodycontent"
                    hx-push-url="{% url 'enterpriseviz:index' %}" label="Go to home page">
      Go to home page
    </calcite-button>
  </div>
</div>
